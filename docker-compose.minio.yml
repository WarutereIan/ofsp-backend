# Optional: run MinIO (S3-compatible) for image uploads.
# Usage: docker compose -f docker-compose.minio.yml up -d
# Then create a bucket (e.g. "uploads") in the MinIO console: http://localhost:9001
# Add to .env: S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY, S3_PUBLIC_URL

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: {}
