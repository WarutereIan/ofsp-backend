# Nginx config for OFSP backend (ofsp.jirani.store)
# Certbot manages SSL - just add this location block to your existing config
# 
# Edit: sudo nano /etc/nginx/sites-available/ofsp.jirani.store
# Test: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name ofsp.jirani.store;

    location / {
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Cookie' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cookie handling - pass cookies between client and backend
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # Timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Pass CORS headers from backend
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Allow-Credentials;
    }

    # Certbot will add SSL config below this line automatically
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ofsp.jirani.store/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ofsp.jirani.store/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP redirect (managed by Certbot)
server {
    if ($host = ofsp.jirani.store) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ofsp.jirani.store;
    return 404; # managed by Certbot
}
